<mat-grid-list cols="4" gutterSize=16 rowHeight="400px">
    @for (product of productStore.products(); track product.id) {
        <mat-grid-tile>
            <product [product]="product" />
        </mat-grid-tile>
    } @empty {
        There are no products.
        <!-- TODO show a proper warning, not an error as no products is valid response  -->
    }
</mat-grid-list>
